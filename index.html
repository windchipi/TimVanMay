<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ TIÊN TRI - GD Fortune Toolbox</title>
    <script language="javascript" src="https://www.minhngoc.net.vn/jquery/jquery-1.7.2.js"></script>
    <link rel="stylesheet" type="text/css" href="https://www.minhngoc.net.vn/style/bangketqua_mini.css"/>
    <script src="mo-thay-gi.js"></script>

    <style>
        :root {
            --primary: #00ff95;
            --primary-glow: rgba(0, 255, 149, 0.4);
            --bg-deep: #050509;
            --card-bg: rgba(22, 27, 34, 0.8);
            --card-w: 350px; 
            --card-h: 574px; 
            --xoso-red: #ff3333;
            --magic-purple: #a020f0;
        }

        body { text-align: center; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-deep); color: #c9d1d9; margin: 0; overflow-x: hidden; position: relative; }
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* LOBBY */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .lobby-title { font-size: 2.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 25px; text-shadow: 0 0 20px var(--primary-glow); }
        .menu-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 350px; }
        .menu-btn { padding: 18px; font-size: 1rem; font-weight: bold; cursor: pointer; background: var(--card-bg); color: var(--primary); border: 2px solid var(--primary); border-radius: 50px; transition: 0.3s ease; text-transform: uppercase; box-shadow: 0 0 10px var(--primary-glow); backdrop-filter: blur(5px); }
        .menu-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); transform: scale(1.05); }
        .btn-alt { border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
        .btn-magic { border-color: var(--magic-purple); color: var(--magic-purple); }
        .btn-magic:hover { background: var(--magic-purple); color: #fff; box-shadow: 0 0 30px var(--magic-purple); }

        /* STAGES */
        .stage { display: none; padding: 15px; animation: fadeIn 0.5s; position: relative; z-index: 1; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* CHIÊM TINH UI - FIXED */
        .magic-box { 
            max-width: 550px; margin: 20px auto; 
            background: var(--card-bg); padding: 40px 20px; 
            border-radius: 20px; border: 2px solid var(--magic-purple); 
            box-shadow: 0 0 30px rgba(160, 32, 240, 0.3);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center;
        }
        .magic-input { 
            width: 90%; max-width: 400px; padding: 15px; 
            background: #000; border: 2px solid var(--magic-purple); 
            color: #fff; border-radius: 10px; font-size: 1.2rem; 
            text-align: center; margin-bottom: 20px; outline: none;
            box-sizing: border-box; /* Fix lỗi lệch UI */
        }
        .magic-res-title { color: var(--magic-purple); font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
        .magic-numbers { font-size: 4rem; color: #ffcc00; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 20px #ffcc00; margin: 10px 0; }
        .magic-soul { font-style: italic; color: #ccc; line-height: 1.6; max-width: 90%; }
        
        .suggest-roll {
            margin-top: 20px; padding: 15px; border: 1px dashed #666; border-radius: 10px;
            background: rgba(255, 255, 255, 0.05); width: 90%;
        }
        .roll-now-btn {
            background: #ffcc00; color: #000; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
            text-transform: uppercase;
        }

        /* ROLL SỐ UI */
        .num-display { font-size: 8rem; font-weight: bold; color: #ffcc00; margin: 30px 0; text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); }
        .lotto-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 30px 0; }
        .lotto-ball { width: 70px; height: 70px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; border: 4px solid #ffcc00; }

        /* CONTACT */
        .contact-area { margin-top: 20px; padding: 15px; background: var(--card-bg); border-radius: 12px; display: inline-block; }
        .qr-img { width: 110px; height: 110px; border: 1px solid var(--primary); border-radius: 10px; }

        @media (max-width: 600px) { :root { --card-w: 90vw; } .magic-input { width: 100%; } }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div id="lobby">
        <h1 class="lobby-title">🔮 NHÀ TIÊN TRI 🔮</h1>
        <div class="menu-group">
            <button class="menu-btn" onclick="prepareCardGame(1)">Rút 1 Lá (Đơn Quẻ)</button>
            <button class="menu-btn" onclick="prepareCardGame(3)">Rút 3 Lá (Tam Quẻ)</button>
            <button class="menu-btn btn-magic" onclick="showDreamStage()">CHIÊM TINH ĐOÁN SỐ</button>
            <button class="menu-btn btn-alt" onclick="initNumberStage('small')">VẬN MAY NHỎ (1-99)</button>
            <button class="menu-btn btn-alt" onclick="initNumberStage('big')">VẬN MAY LỚN (6 SỐ)</button>
            <button class="menu-btn" style="border-color:#ff3333; color:#ff3333" onclick="showXSMB()">KẾT QUẢ XSMB</button>
        </div>
    </div>

    <div id="stage-dream" class="stage">
        <div class="nav-bar">
            <button class="back-btn" onclick="resetApp()">← Quay lại</button>
            <h2 style="color: var(--magic-purple); margin:0;">CHIÊM TINH GIẤC MƠ</h2>
            <div style="width: 50px;"></div>
        </div>
        <div class="magic-box">
            <p style="margin-bottom: 20px;">Đêm qua bà mơ thấy gì? (Gõ: rắn, tiền, cá...)</p>
            <input type="text" id="dream-input" class="magic-input" placeholder="Nhập từ khóa..." oninput="lookupDream()">
            
            <div id="dream-result" style="display:none; width: 100%;">
                <div class="magic-res-title">CON SỐ ĐIỀM BÁO:</div>
                <div id="res-numbers" class="magic-numbers">--</div>
                <div id="res-soul" class="magic-soul"></div>
            </div>

            <div id="dream-none" class="suggest-roll" style="display:block;">
                <p>Chưa tìm thấy điềm báo cho giấc mơ này...</p>
                <p style="font-size: 0.9rem; color: #888;">Để vũ trụ tự quyết định cho bà một con số?</p>
                <button class="roll-now-btn" onclick="initNumberStage('small')">HỎI VŨ TRỤ (ROLL NGAY)</button>
            </div>
        </div>
        <div class="contact-area"><img src="lienhe.png" class="qr-img"></div>
    </div>

    <div id="stage-number" class="stage">
        <div class="nav-bar"><button class="back-btn" onclick="resetApp()">← Quay lại</button><h2 id="number-title" style="color:#ffcc00"></h2></div>
        <div id="number-result" style="min-height:200px; display:flex; justify-content:center; align-items:center;"></div>
        <button class="menu-btn btn-alt" id="roll-btn" style="width:220px; background:#ffcc00; color:#000; margin: 20px auto;">KHAI VẬN</button>
    </div>

    <div id="stage-card" class="stage">
        <div class="nav-bar"><button class="back-btn" onclick="resetApp()">← Quay lại</button><h2 id="card-title" style="color:var(--primary)"></h2></div>
        <div id="ritual-area" style="max-width:500px; margin:auto; background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid var(--primary)">
            <textarea id="ritual-input" style="width:100%; height:80px; background:#000; color:#fff; border:1px solid #444; padding:10px" placeholder="Tâm nguyện của bà..."></textarea>
            <button class="ritual-btn" style="width:100%; padding:15px; margin-top:10px; background:var(--primary); font-weight:bold" onclick="startRitual()">KHAI QUẺ</button>
        </div>
        <div id="wish-display" style="margin:15px auto; font-style:italic; border:1px dashed var(--primary); display:none; padding:10px; max-width:600px;"></div>
        <div class="tabletop locked" id="tabletop"></div>
    </div>

    <div id="stage-xsmb" class="stage">
        <div class="nav-bar"><button class="back-btn" onclick="resetApp()">← Quay lại</button><h2 style="color:#ff3333">XSMB</h2></div>
        <div style="background:#fff; padding:10px; border-radius:10px; max-width:400px; margin:auto;">
            <script language="javascript" src="https://www.minhngoc.net.vn/getkqxs/mien-bac.js"></script>
        </div>
    </div>

    <script>
        // CANVAS VŨ TRỤ
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.1 + 0.05; } update() { this.y -= this.speed; if (this.y < 0) this.reset(); } draw() { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); } }
        function initSpace() { resize(); for(let i=0; i<100; i++) particles.push(new Particle()); animate(); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        window.addEventListener('resize', resize); initSpace();

        // CHIÊM TINH LOGIC
        function showDreamStage() {
            resetApp();
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('stage-dream').style.display = 'block';
        }

        function lookupDream() {
            const input = document.getElementById('dream-input').value.toLowerCase().trim();
            const resDiv = document.getElementById('dream-result');
            const noneDiv = document.getElementById('dream-none');
            
            if (!input) { resDiv.style.display = 'none'; noneDiv.style.display = 'block'; return; }

            const match = DreamDB.find(item => input.includes(item.key) || item.key.includes(input));

            if (match) {
                resDiv.style.display = 'block'; noneDiv.style.display = 'none';
                document.getElementById('res-numbers').innerText = match.numbers;
                document.getElementById('res-soul').innerText = match.soul;
            } else {
                resDiv.style.display = 'none'; noneDiv.style.display = 'block';
            }
        }

        // CHUNG
        function resetApp() {
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
            document.getElementById('lobby').style.display = 'flex';
        }

        function initNumberStage(type) {
            resetApp();
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('stage-number').style.display = 'block';
            document.getElementById('number-title').innerText = (type === 'small') ? "VẬN MAY NHỎ (1-99)" : "VẬN MAY LỚN (6 SỐ)";
            const res = document.getElementById('number-result');
            const btn = document.getElementById('roll-btn');
            res.innerHTML = "Chờ tín hiệu...";
            btn.onclick = () => {
                if (type === 'small') res.innerHTML = `<div class="num-display">${Math.floor(Math.random()*99)+1}</div>`;
                else {
                    let s = new Set(); while(s.size<6) s.add(Math.floor(Math.random()*55)+1);
                    let h = '<div class="lotto-group">';
                    Array.from(s).sort((a,b)=>a-b).forEach(n => h+=`<div class="lotto-ball">${n<10?'0'+n:n}</div>`);
                    res.innerHTML = h + '</div>';
                }
            };
        }

        function showXSMB() { resetApp(); document.getElementById('lobby').style.display = 'none'; document.getElementById('stage-xsmb').style.display = 'block'; }
        
        // LOGIC BÀI (Rút gọn để bà dễ copy)
        const cardPool = []; for (let i = 1; i <= 113; i++) cardPool.push(i.toString()); cardPool.push("67.5", "93.5", "95.5");
        function prepareCardGame(count) {
            resetApp(); document.getElementById('lobby').style.display = 'none'; document.getElementById('stage-card').style.display = 'block';
            document.getElementById('card-title').innerText = count === 1 ? "ĐƠN QUẺ" : "TAM QUẺ";
            const tabletop = document.getElementById('tabletop'); tabletop.innerHTML = '';
            let picked = [...cardPool].sort(() => Math.random() - 0.5).slice(0, count);
            picked.forEach(num => {
                const slot = document.createElement('div'); slot.style.width = "350px";
                slot.innerHTML = `<div class="flip-card" onclick="this.querySelector('.flip-card-inner').classList.toggle('is-flipped')"><div class="flip-card-inner" style="position:relative;width:100%;height:574px;transition:0.6s;transform-style:preserve-3d;"><div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;border:2px solid var(--primary);border-radius:15px;background:#111;"><img src="VN/BACK.png" style="width:100%;height:100%;object-fit:contain;"></div><div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;border:2px solid var(--primary);border-radius:15px;transform:rotateY(180deg);background:#111;"><img src="VN/${num}.png" style="width:100%;height:100%;object-fit:contain;"></div></div></div>`;
                tabletop.appendChild(slot);
            });
        }
        function startRitual() {
            if (!document.getElementById('ritual-input').value.trim()) return alert("Khấn nguyện đi bà!");
            document.getElementById('ritual-area').style.display = 'none';
            document.getElementById('wish-display').innerText = "Tâm nguyện: " + document.getElementById('ritual-input').value;
            document.getElementById('wish-display').style.display = 'block';
            document.getElementById('tabletop').classList.remove('locked');
        }
    </script>
</body>
</html>
