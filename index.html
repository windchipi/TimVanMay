<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ TIÊN TRI - GD Fortune Toolbox</title>
    <script language="javascript" src="https://www.minhngoc.net.vn/jquery/jquery-1.7.2.js"></script>
    <link rel="stylesheet" type="text/css" href="https://www.minhngoc.net.vn/style/bangketqua_mini.css"/>
    <script src="mo-thay-gi.js"></script>

    <style>
        :root {
            --primary: #00ff95;
            --primary-glow: rgba(0, 255, 149, 0.4);
            --bg-deep: #050509;
            --card-bg: rgba(22, 27, 34, 0.8);
            --card-w: 350px; 
            --card-h: 574px; 
            --xoso-red: #ff3333;
            --magic-purple: #a020f0;
        }

        body { text-align: center; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-deep); color: #c9d1d9; margin: 0; overflow-x: hidden; position: relative; }
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* LOBBY */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .lobby-title { font-size: 2.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 25px; text-shadow: 0 0 20px var(--primary-glow); }
        .menu-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 350px; }
        .menu-btn { padding: 18px; font-size: 1rem; font-weight: bold; cursor: pointer; background: var(--card-bg); color: var(--primary); border: 2px solid var(--primary); border-radius: 50px; transition: 0.3s ease; text-transform: uppercase; box-shadow: 0 0 10px var(--primary-glow); backdrop-filter: blur(5px); }
        
        /* STAGES */
        .stage { display: none; padding: 15px; animation: fadeIn 0.5s; position: relative; z-index: 1; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* RITUAL AREA */
        .ritual-container { max-width: 550px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); backdrop-filter: blur(10px); }
        .ritual-textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; resize: none; font-size: 1rem; margin-top: 10px; }
        .ritual-btn { margin-top: 15px; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        #wish-display { display: none; max-width: 800px; margin: 0 auto 20px; padding: 15px; border: 1px dashed var(--primary); background: rgba(0, 255, 149, 0.1); border-radius: 10px; font-style: italic; color: #fff; }

        /* TABLETOP */
        .tabletop { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 20px; flex-wrap: wrap; padding-bottom: 30px; min-height: 600px; }
        .locked { filter: blur(10px); pointer-events: none; opacity: 0.3; }
        .card-slot { width: var(--card-w); display: flex; flex-direction: column; align-items: center; }
        
        /* CARD FLIP */
        .flip-card { width: var(--card-w); height: var(--card-h); perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .card-back { background: #111; }
        .card-front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: contain; border-radius: 13px; }

        /* CÁC THÀNH PHẦN KHÁC (Số, XSMB...) Giữ nguyên như cũ */
        .lotto-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 30px 0; }
        .lotto-ball { width: 70px; height: 70px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; border: 4px solid #ffcc00; }
    </style>
</head>
<body>
    <canvas id="space-canvas"></canvas>

    <div id="lobby">
        <h1 class="lobby-title">🔮 NHÀ TIÊN TRI 🔮</h1>
        <div class="menu-group">
            <button class="menu-btn" onclick="prepareCardGame(1)">Rút 1 Lá (Đơn Quẻ)</button>
            <button class="menu-btn" onclick="prepareCardGame(3)">Rút 3 Lá (Tam Quẻ)</button>
            <button class="menu-btn btn-magic" style="border-color: var(--magic-purple); color: var(--magic-purple);" onclick="showDreamStage()">CHIÊM TINH ĐOÁN SỐ</button>
            <button class="menu-btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="initNumberStage('small')">VẬN MAY NHỎ (1-99)</button>
            <button class="menu-btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="initNumberStage('big')">VẬN MAY LỚN (6 SỐ)</button>
            <button class="menu-btn" style="border-color:#ff3333; color:#ff3333" onclick="showXSMB()">KẾT QUẢ XSMB</button>
        </div>
    </div>

    <div id="stage-card" class="stage">
        <div class="nav-bar">
            <button class="back-btn" onclick="resetApp()">← Quay lại</button>
            <h2 id="card-title" style="color: var(--primary); margin:0;"></h2>
            <div style="width: 50px;"></div>
        </div>
        <div id="wish-display"></div> 
        <div id="ritual-area" class="ritual-container">
            <p style="margin: 0; color: var(--primary); font-weight: bold;">TÂM NIỆM ĐIỀU BẠN MUỐN HỎI (DƯỚI 200 TỪ):</p>
            <textarea id="ritual-input" class="ritual-textarea"></textarea>
            <button class="ritual-btn" onclick="startRitual()">Gửi tâm nguyện & Khai quẻ</button>
        </div>
        <div class="tabletop locked" id="tabletop"></div>
    </div>

    <script>
        const placeholderSuggestions = [
            "Dự án game sắp tới của con có bùng nổ không Master?",
            "Cơ chế Core Loop này có giúp Retention tăng không?",
            "Master ơi, con có nên đổi hướng sang làm game Hypercasual không?",
            "Con muốn hỏi về vận may tài chính trong tháng tới...",
            "Master cho con hỏi về đường tình duyên năm nay ạ!",
            "Con đang bí ý tưởng cho Hero mới, xin Master chỉ điểm!",
            "Quẻ này nói gì về sự nghiệp của con trong năm 2026?"
        ];

        const cardPool = [];
        for (let i = 1; i <= 113; i++) cardPool.push(i.toString());
        cardPool.push("67.5", "93.5", "95.5");

        let currentActiveCards = [];
        const lobby = document.getElementById('lobby');
        const stageCard = document.getElementById('stage-card');
        const tabletop = document.getElementById('tabletop');

        function resetApp() {
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
            lobby.style.display = 'flex';
            document.getElementById('ritual-area').style.display = 'block';
            document.getElementById('wish-display').style.display = 'none';
            tabletop.classList.add('locked');
        }

        function prepareCardGame(count) {
            // Thay đổi Placeholder ngẫu nhiên mỗi lần rút
            const randomIdx = Math.floor(Math.random() * placeholderSuggestions.length);
            document.getElementById('ritual-input').placeholder = placeholderSuggestions[randomIdx];
            document.getElementById('ritual-input').value = "";

            lobby.style.display = 'none';
            stageCard.style.display = 'block';
            document.getElementById('card-title').innerText = count === 1 ? "ĐƠN QUẺ" : "TAM QUẺ TÀI LỘC";
            tabletop.innerHTML = ''; 
            
            let shuffled = [...cardPool].sort(() => Math.random() - 0.5);
            currentActiveCards = shuffled.slice(0, count);

            currentActiveCards.forEach(cardName => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-label" style="color:var(--primary); font-weight:bold; margin-bottom:10px;">BÀI ĐANG ÚP...</div>
                    <div class="flip-card" onclick="flipCard(this, '${cardName}')">
                        <div class="flip-card-inner">
                            <div class="card-back"><img src="VN/BACK.png"></div>
                            <div class="card-front"><img src="VN/${cardName}.png"></div>
                        </div>
                    </div>
                `;
                tabletop.appendChild(slot);
            });
        }

        function flipCard(el, num) {
            const inner = el.querySelector('.flip-card-inner');
            if (!inner.classList.contains('is-flipped')) {
                inner.classList.add('is-flipped');
                el.parentElement.querySelector('.card-label').innerText = `LÁ SỐ #${num}`;
            }
        }

        function startRitual() {
            const val = document.getElementById('ritual-input').value.trim();
            if (!val) return alert("Bà chưa nhập tâm nguyện kìa!");
            document.getElementById('ritual-area').style.display = 'none';
            const wd = document.getElementById('wish-display');
            wd.innerText = `Tâm nguyện: "${val}"`;
            wd.style.display = 'block';
            tabletop.classList.remove('locked');
            document.querySelectorAll('.card-label').forEach(l => l.innerText = "CHẠM ĐỂ LẬT BÀI");
        }

        // --- Logic cho Vũ Trụ, Chiêm Tinh, Vận May giữ nguyên như bản trước ---
        // (Bà hãy giữ lại các hàm animate, resize, showDreamStage, showXSMB, initNumberStage cũ nhé)
    </script>
</body>
</html>
