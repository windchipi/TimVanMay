<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ TIÊN TRI - GD Fortune Toolbox</title>
    <script language="javascript" src="https://www.minhngoc.net.vn/jquery/jquery-1.7.2.js"></script>
    <link rel="stylesheet" type="text/css" href="https://www.minhngoc.net.vn/style/bangketqua_mini.css"/>
    <script src="mo-thay-gi.js"></script>

    <style>
        :root {
            --primary: #00ff95;
            --primary-glow: rgba(0, 255, 149, 0.4);
            --bg-deep: #050509;
            --card-bg: rgba(22, 27, 34, 0.8);
            --card-w: 350px; 
            --card-h: 574px; 
            --xoso-red: #ff3333;
            --magic-purple: #a020f0;
        }

        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-deep); color: #c9d1d9; 
            margin: 0; overflow-x: hidden; position: relative;
        }

        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* LOBBY */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .lobby-title { font-size: 2.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 25px; text-shadow: 0 0 20px var(--primary-glow); }
        .menu-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 350px; }
        .menu-btn { padding: 18px; font-size: 1rem; font-weight: bold; cursor: pointer; background: var(--card-bg); color: var(--primary); border: 2px solid var(--primary); border-radius: 50px; transition: 0.3s ease; text-transform: uppercase; box-shadow: 0 0 10px var(--primary-glow); backdrop-filter: blur(5px); }
        .menu-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); transform: scale(1.05); }
        .btn-alt { border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
        .btn-magic { border-color: var(--magic-purple); color: var(--magic-purple); }
        .btn-magic:hover { background: var(--magic-purple); color: #fff; box-shadow: 0 0 30px var(--magic-purple); }

        /* STAGES COMMON */
        .stage { display: none; padding: 15px; animation: fadeIn 0.5s; position: relative; z-index: 1; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* RITUAL AREA */
        .ritual-container { max-width: 550px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); backdrop-filter: blur(10px); }
        .ritual-textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; resize: none; font-size: 1rem; margin-top: 10px; }
        .ritual-btn { margin-top: 15px; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        #wish-display { display: none; max-width: 800px; margin: 0 auto 20px; padding: 15px; border: 1px dashed var(--primary); background: rgba(0, 255, 149, 0.1); border-radius: 10px; font-style: italic; color: #fff; }

        /* TABLETOP - FIX UI LỆCH */
        .tabletop { 
            display: flex; flex-direction: row; justify-content: center; 
            align-items: flex-start; gap: 20px; flex-wrap: wrap; 
            padding-bottom: 30px; min-height: 600px; 
        }
        .locked { filter: blur(10px); pointer-events: none; opacity: 0.3; }
        .card-slot { width: var(--card-w); display: flex; flex-direction: column; align-items: center; }
        .card-label { color: var(--primary); font-family: monospace; margin-bottom: 10px; font-size: 1.1rem; font-weight: bold; }
        
        /* CARD FLIP LOGIC */
        .flip-card { width: var(--card-w); height: var(--card-h); perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .card-back { background: #111; }
        .card-front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: contain; border-radius: 13px; }

        /* MAGIC BOX UI */
        .magic-box { max-width: 550px; margin: 20px auto; background: var(--card-bg); padding: 40px 20px; border-radius: 20px; border: 2px solid var(--magic-purple); box-shadow: 0 0 30px rgba(160, 32, 240, 0.3); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; }
        .magic-input { width: 90%; padding: 15px; background: #000; border: 2px solid var(--magic-purple); color: #fff; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; box-sizing: border-box; }
        .magic-numbers { font-size: 4rem; color: #ffcc00; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 20px #ffcc00; margin: 10px 0; }
        
        /* ROLL SỐ UI */
        .num-display { font-size: 8rem; font-weight: bold; color: #ffcc00; margin: 30px 0; text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); }
        .lotto-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 30px 0; }
        .lotto-ball { width: 70px; height: 70px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; border: 4px solid #ffcc00; }

        .contact-area { margin-top: 20px; padding: 15px; background: var(--card-bg); border-radius: 12px; display: inline-block; }
        .qr-img { width: 110px; height: 110px; border: 1px solid var(--primary); border-radius: 10px; }

        @media (max-width: 1100px) { .tabletop { flex-direction: column; align-items: center; } :root { --card-w: 340px; } }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div id="lobby">
        <h1 class="lobby-title">🔮 NHÀ TIÊN TRI 🔮</h1>
        <div style="margin-bottom: 25px;">
            <select id="deck-selector" style="padding: 12px; background: #000; color: var(--primary); border: 2px solid var(--primary); border-radius: 8px; font-weight: bold;">
                <option value="VN">DATABASE: TIẾNG VIỆT</option>
                <option value="ENG">DATABASE: ENGLISH</option>
            </select>
        </div>
        <div class="menu-group">
            <button class="menu-btn" onclick="prepareCardGame(1)">Rút 1 Lá (Đơn Quẻ)</button>
            <button class="menu-btn" onclick="prepareCardGame(3)">Rút 3 Lá (Tam Quẻ)</button>
            <button class="menu-btn btn-magic" onclick="showDreamStage()">CHIÊM TINH ĐOÁN SỐ</button>
            <button class="menu-btn btn-alt" onclick="initNumberStage('small')">VẬN MAY NHỎ (1-99)</button>
            <button class="menu-btn btn-alt" onclick="initNumberStage('big')">VẬN MAY LỚN (6 SỐ)</button>
            <button class="menu-btn" style="border-color:#ff3333; color:#ff3333" onclick="showXSMB()">KẾT QUẢ XSMB</button>
        </div>
    </div>

    <div id="stage-card" class="stage">
        <div class="nav-bar">
            <button class="back-btn" onclick="resetApp()">← Quay lại</button>
            <h2 id="card-title" style="color: var(--primary); margin:0;"></h2>
            <select id="live-lang-switch" class="lang-switch-mini" style="background: #000; color: var(--primary); border: 1px solid var(--primary); padding: 5px; border-radius: 5px;" onchange="switchLanguage()">
                <option value="VN">VN</option>
                <option value="ENG">ENG</option>
            </select>
        </div>
        <div id="wish-display"></div> 
        <div id="ritual-area" class="ritual-container">
            <p style="margin: 0; color: var(--primary); font-weight: bold;">TÂM NIỆM ĐIỀU BẠN MUỐN HỎI (DƯỚI 200 TỪ):</p>
            <textarea id="ritual-input" class="ritual-textarea" placeholder="Yêu cầu tâm nguyện của bà..."></textarea>
            <button class="ritual-btn" onclick="startRitual()">Gửi tâm nguyện & Khai quẻ</button>
        </div>
        <div class="tabletop locked" id="tabletop"></div>
        <div class="contact-area"><p>Luận giải cùng Master GD:</p><img src="lienhe.png" class="qr-img"></div>
    </div>

    <div id="stage-dream" class="stage">
        <div class="nav-bar">
            <button class="back-btn" onclick="resetApp()">← Quay lại</button>
            <h2 style="color: var(--magic-purple); margin:0;">CHIÊM TINH GIẤC MƠ</h2>
            <div style="width: 50px;"></div>
        </div>
        <div class="magic-box">
            <p style="margin-bottom: 20px;">Đêm qua bà mơ thấy gì? (Gõ: rắn, tiền, cá...)</p>
            <input type="text" id="dream-input" class="magic-input" placeholder="Nhập từ khóa..." oninput="lookupDream()">
            <div id="dream-result" style="display:none; width: 100%;">
                <div class="magic-numbers" id="res-numbers">--</div>
                <div class="magic-soul" id="res-soul"></div>
            </div>
            <div id="dream-none" style="margin-top:20px;">
                <p>Chưa tìm thấy điềm báo...</p>
                <button class="menu-btn btn-alt" style="padding:10px 20px; font-size:0.8rem;" onclick="initNumberStage('small')">HỎI VŨ TRỤ (ROLL)</button>
            </div>
        </div>
    </div>

    <div id="stage-number" class="stage">
        <div class="nav-bar"><button class="back-btn" onclick="resetApp()">← Quay lại</button><h2 id="number-title" style="color:#ffcc00"></h2></div>
        <div id="number-result" style="min-height:200px; display:flex; justify-content:center; align-items:center;"></div>
        <button class="menu-btn btn-alt" id="roll-btn" style="width:220px; margin: 20px auto;">KHAI VẬN</button>
    </div>

    <div id="stage-xsmb" class="stage">
        <div class="nav-bar"><button class="back-btn" onclick="resetApp()">← Quay lại</button><h2 style="color:#ff3333">KẾT QUẢ MIỀN BẮC</h2></div>
        <div style="background:#fff; padding:15px; border-radius:15px; max-width:400px; margin:auto;">
            <div id="box_kqxs_minhngoc">
                <script language="javascript">bgcolor="transparent";titlecolor="#00ff95";dbcolor="#ff3333";fsize="12px";kqwidth="380px";</script>
                <script language="javascript" src="https://www.minhngoc.net.vn/getkqxs/mien-bac.js"></script>
            </div>
        </div>
    </div>

    <script>
        // 1. CANVAS VŨ TRỤ
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.1 + 0.05; } update() { this.y -= this.speed; if (this.y < 0) this.reset(); } draw() { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); } }
        function initSpace() { resize(); particles = []; for(let i=0; i<100; i++) particles.push(new Particle()); animate(); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        window.addEventListener('resize', resize); initSpace();

        // 2. LOGIC CHUNG
        const cardPool = [];
        for (let i = 1; i <= 113; i++) cardPool.push(i.toString());
        cardPool.push("67.5", "93.5", "95.5");

        let currentActiveCards = [];
        const lobby = document.getElementById('lobby');
        const stageCard = document.getElementById('stage-card');
        const stageXSMB = document.getElementById('stage-xsmb');
        const stageNum = document.getElementById('stage-number');
        const stageDream = document.getElementById('stage-dream');
        const tabletop = document.getElementById('tabletop');

        function resetApp() {
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
            lobby.style.display = 'flex';
            document.getElementById('ritual-area').style.display = 'block';
            document.getElementById('wish-display').style.display = 'none';
            tabletop.classList.add('locked');
            currentActiveCards = [];
        }

        function prepareCardGame(count) {
            const folder = document.getElementById('deck-selector').value;
            document.getElementById('live-lang-switch').value = folder;
            lobby.style.display = 'none';
            stageCard.style.display = 'block';
            document.getElementById('card-title').innerText = count === 1 ? "ĐƠN QUẺ" : "TAM QUẺ TÀI LỘC";
            tabletop.innerHTML = ''; 
            
            let shuffled = [...cardPool].sort(() => Math.random() - 0.5);
            currentActiveCards = shuffled.slice(0, count);

            currentActiveCards.forEach(cardName => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-label">BÀI ĐANG ÚP...</div>
                    <div class="flip-card" onclick="flipCard(this, '${cardName}')">
                        <div class="flip-card-inner">
                            <div class="card-back"><img src="${folder}/BACK.png"></div>
                            <div class="card-front"><img src="${folder}/${cardName}.png"></div>
                        </div>
                    </div>
                `;
                tabletop.appendChild(slot);
            });
        }

        function flipCard(el, num) {
            const inner = el.querySelector('.flip-card-inner');
            if (!inner.classList.contains('is-flipped')) {
                inner.classList.add('is-flipped');
                el.parentElement.querySelector('.card-label').innerText = `LÁ SỐ #${num}`;
            }
        }

        function startRitual() {
            const val = document.getElementById('ritual-input').value.trim();
            if (!val) return alert("Hãy nhập tâm nguyện!");
            document.getElementById('ritual-area').style.display = 'none';
            const wd = document.getElementById('wish-display');
            wd.innerText = `Tâm nguyện: "${val}"`;
            wd.style.display = 'block';
            tabletop.classList.remove('locked');
            document.querySelectorAll('.card-label').forEach(l => l.innerText = "CHẠM ĐỂ LẬT BÀI");
        }

        function switchLanguage() {
            const newFolder = document.getElementById('live-lang-switch').value;
            document.querySelectorAll('.flip-card').forEach((card, idx) => {
                card.querySelector('.card-back img').src = `${newFolder}/BACK.png`;
                card.querySelector('.card-front img').src = `${newFolder}/${currentActiveCards[idx]}.png`;
            });
        }

        function lookupDream() {
            const input = document.getElementById('dream-input').value.toLowerCase().trim();
            const resDiv = document.getElementById('dream-result');
            const noneDiv = document.getElementById('dream-none');
            if (!input) { resDiv.style.display = 'none'; noneDiv.style.display = 'block'; return; }
            const match = DreamDB.find(item => input.includes(item.key) || item.key.includes(input));
            if (match) {
                resDiv.style.display = 'block'; noneDiv.style.display = 'none';
                document.getElementById('res-numbers').innerText = match.numbers;
                document.getElementById('res-soul').innerText = match.soul;
            } else {
                resDiv.style.display = 'none'; noneDiv.style.display = 'block';
            }
        }

        function showDreamStage() { lobby.style.display = 'none'; stageDream.style.display = 'block'; }
        function showXSMB() { lobby.style.display = 'none'; stageXSMB.style.display = 'block'; }

        function initNumberStage(type) {
            document.querySelectorAll('.stage').forEach(s => s.style.display = 'none');
            lobby.style.display = 'none'; stageNum.style.display = 'block';
            const res = document.getElementById('number-result');
            const btn = document.getElementById('roll-btn');
            document.getElementById('number-title').innerText = type === 'small' ? "VẬN MAY NHỎ" : "VẬN MAY LỚN";
            res.innerHTML = "Chờ tín hiệu...";
            btn.onclick = () => {
                if (type === 'small') res.innerHTML = `<div class="num-display">${Math.floor(Math.random()*99)+1}</div>`;
                else {
                    let s = new Set(); while(s.size<6) s.add(Math.floor(Math.random()*55)+1);
                    let h = '<div class="lotto-group">';
                    Array.from(s).sort((a,b)=>a-b).forEach(n => h+=`<div class="lotto-ball">${n<10?'0'+n:n}</div>`);
                    res.innerHTML = h + '</div>';
                }
            };
        }
    </script>
</body>
</html>
