<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ TIÊN TRI - Lobby</title>
    <style>
        :root {
            --primary: #00ff95;
            --primary-glow: rgba(0, 255, 149, 0.4);
            --bg-deep: #050509;
            --card-bg: rgba(22, 27, 34, 0.85);
        }
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-deep); color: #c9d1d9; 
            margin: 0; overflow: hidden; 
        }
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .lobby-title { font-size: 2.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 25px; text-shadow: 0 0 20px var(--primary-glow); }
        .menu-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 350px; }
        
        /* Chuyển button thành thẻ a để điều hướng trang */
        .menu-link { 
            padding: 18px; font-size: 1rem; font-weight: bold; cursor: pointer; 
            background: var(--card-bg); color: var(--primary); 
            border: 2px solid var(--primary); border-radius: 50px; 
            transition: 0.3s ease; text-transform: uppercase; 
            box-shadow: 0 0 10px var(--primary-glow); backdrop-filter: blur(5px);
            text-decoration: none; display: block;
        }
        .menu-link:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); transform: scale(1.05); }

        .tele-fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: #0088cc; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(0, 136, 204, 0.6); z-index: 9999; transition: 0.3s; }
        .tele-fab:hover { transform: scale(1.1) rotate(10deg); box-shadow: 0 0 30px #00ff95; }
        .tele-fab img { width: 35px; height: 35px; }
    </style>
</head>
<body>
    <canvas id="space-canvas"></canvas>

    <div id="lobby">
        <h1 class="lobby-title">🔮 NHÀ TIÊN TRI 🔮</h1>
        <div class="menu-group">
            <a href="que-bai.html?count=1" class="menu-link">Rút 1 Lá (Đơn Quẻ)</a>
            <a href="que-bai.html?count=3" class="menu-link">Rút 3 Lá (Tam Quẻ)</a>
            <a href="chiem-tinh.html" class="menu-link" style="border-color: #a020f0; color: #a020f0;">CHIÊM TINH ĐOÁN SỐ</a>
            <a href="van-may.html?type=small" class="menu-link" style="border-color: #ffcc00; color: #ffcc00;">VẬN MAY NHỎ (1-99)</a>
            <a href="van-may.html?type=big" class="menu-link" style="border-color: #ffcc00; color: #ffcc00;">VẬN MAY LỚN (6 SỐ)</a>
            <a href="xoso.html" class="menu-link" style="border-color: #ff3333; color: #ff3333;">KẾT QUẢ XSMB</a>
        </div>
    </div>

    <a href="https://t.me/windchipi" target="_blank" class="tele-fab">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
    </a>

    <script>
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.1 + 0.05; } update() { this.y -= this.speed; if (this.y < 0) this.reset(); } draw() { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); } }
        function initSpace() { resize(); particles = []; for(let i=0; i<100; i++) particles.push(new Particle()); animate(); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        window.addEventListener('resize', resize); initSpace();
    </script>
</body>
</html>
