<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ TIÊN TRI - GD Fortune Toolbox</title>
    <style>
        :root {
            --primary: #00ff95;
            --primary-glow: rgba(0, 255, 149, 0.4);
            --bg-deep: #050509;
            --card-bg: rgba(22, 27, 34, 0.8);
            --card-w: 350px; 
            --card-h: 574px; 
        }

        body { 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-deep);
            color: #c9d1d9; 
            margin: 0; 
            overflow-x: hidden;
            position: relative;
        }

        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* LOBBY */
        #lobby { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        
        .lobby-title { 
            font-size: 2.8rem; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-shadow: 0 0 20px var(--primary-glow); 
        }

        .menu-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
            max-width: 350px; 
        }
        
        .menu-btn { 
            padding: 18px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            background: var(--card-bg); 
            color: var(--primary); 
            border: 2px solid var(--primary); 
            border-radius: 50px; 
            transition: 0.3s ease; 
            text-transform: uppercase; 
            box-shadow: 0 0 10px var(--primary-glow); 
            backdrop-filter: blur(5px);
        }
        
        .menu-btn:hover { 
            background: var(--primary); 
            color: #000; 
            box-shadow: 0 0 30px var(--primary); 
            transform: scale(1.05);
        }
        
        .btn-alt { border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
        .btn-alt:hover { background: #ffcc00; color: #000; box-shadow: 0 0 30px #ffcc00; }

        select {
            padding: 12px; background: #000; color: var(--primary); 
            border: 2px solid var(--primary); border-radius: 8px; font-weight: bold;
        }

        /* STAGES */
        .stage { display: none; padding: 15px; animation: fadeIn 0.5s; position: relative; z-index: 1; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1200px; margin: 0 auto 10px; border-bottom: 1px solid #333; padding-bottom: 10px; 
        }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .lang-switch-mini { background: #000; border: 1px solid var(--primary); color: var(--primary); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* RITUAL */
        #ritual-area { max-width: 550px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); backdrop-filter: blur(10px); }
        textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; resize: none; font-size: 1rem; margin-top: 10px; }
        .ritual-btn { margin-top: 15px; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }

        #wish-display { display: none; max-width: 800px; margin: 0 auto 20px; padding: 15px; border: 1px dashed var(--primary); background: rgba(0, 255, 149, 0.1); border-radius: 10px; font-style: italic; }

        /* TABLETOP */
        .tabletop { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 20px; flex-wrap: wrap; padding-bottom: 30px; }
        .locked { filter: blur(10px); pointer-events: none; opacity: 0.3; }
        .card-slot { width: var(--card-w); margin-bottom: 10px; }
        .card-label { color: var(--primary); font-family: monospace; margin-bottom: 10px; font-size: 1.1rem; font-weight: bold; }
        .flip-card { width: var(--card-w); height: var(--card-h); perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .card-back { background: #111; }
        .card-front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: contain; border-radius: 13px; }

        /* NUMBERS */
        .num-display { font-size: 8rem; font-weight: bold; color: #ffcc00; margin: 40px 0; text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); }
        .lotto-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 40px 0; }
        .lotto-ball { width: 65px; height: 65px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: bold; border: 4px solid #ffcc00; }

        .contact-area { margin-top: 10px; padding: 15px; border-top: 1px solid #333; background: var(--card-bg); border-radius: 12px; display: inline-block; backdrop-filter: blur(5px); }
        .qr-img { width: 110px; height: 110px; border: 1px solid var(--primary); border-radius: 10px; }

        @media (max-width: 1100px) { body { overflow-y: auto; } .tabletop { flex-direction: column; align-items: center; } :root { --card-w: 340px; } }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div id="lobby">
        <h1 class="lobby-title">🔮 NHÀ TIÊN TRI 🔮</h1>
        <div style="margin-bottom: 25px;">
            <select id="deck-selector">
                <option value="VN">DATABASE: TIẾNG VIỆT</option>
                <option value="ENG">DATABASE: ENGLISH</option>
            </select>
        </div>
        <div class="menu-group">
            <button class="menu-btn" onclick="prepareCardGame(1)">Rút 1 Lá (Đơn Quẻ)</button>
            <button class="menu-btn" onclick="prepareCardGame(3)">Rút 3 Lá (Tam Quẻ)</button>
            <button class="menu-btn btn-alt" onclick="initNumberStage('small')">VẬN MAY NHỎ (1-99)</button>
            <button class="menu-btn btn-alt" onclick="initNumberStage('big')">VẬN MAY LỚN (6 SỐ)</button>
        </div>
    </div>

    <div id="stage-card" class="stage">
        <div class="nav-bar">
            <button class="back-btn" onclick="resetApp()">← Quay lại</button>
            <h2 id="card-title" style="color: var(--primary); margin:0; font-size: 1.1rem;"></h2>
            <select id="live-lang-switch" class="lang-switch-mini" onchange="switchLanguage()">
                <option value="VN">VN</option>
                <option value="ENG">ENG</option>
            </select>
        </div>
        <div id="wish-display"></div> 
        <div id="ritual-area">
            <p style="margin: 0; color: var(--primary); font-weight: bold;">TÂM NIỆM ĐIỀU BẠN MUỐN HỎI:</p>
            <textarea id="ritual-input" placeholder="Ví dụ: Tính năng mới này có giúp User Retention tăng không?"></textarea>
            <button class="ritual-btn" onclick="startRitual()">Gửi tâm nguyện & Khai quẻ</button>
        </div>
        <div class="tabletop locked" id="tabletop"></div>
        <div class="contact-area"><p>Luận giải cùng Master GD:</p><img src="lienhe.png" class="qr-img"></div>
    </div>

    <div id="stage-number" class="stage">
        <div class="nav-bar">
            <button class="back-btn" onclick="resetApp()">← Quay lại</button>
            <h2 id="number-title" style="color: #ffcc00; margin:0; font-size: 1.2rem;"></h2>
            <div style="width: 50px;"></div>
        </div>
        <div id="number-result"><div style="font-style: italic; color: #444; margin: 80px 0; font-size: 1.5rem;">Đang chờ tín hiệu vũ trụ...</div></div>
        <button class="menu-btn btn-alt" id="roll-btn" style="width: 250px; background: #ffcc00; color: #000;">KHAI VẬN (ROLL)</button>
        <div style="margin-top: 30px;"><div class="contact-area"><img src="lienhe.png" class="qr-img"></div></div>
    </div>

    <script>
        // --- 1. CANVAS BACKGROUND (Hiệu ứng vũ trụ) ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.1 + 0.05; }
            update() { this.y -= this.speed; if (this.y < 0) this.reset(); }
            draw() { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
        }
        function initSpace() { resize(); particles = []; for(let i=0; i<100; i++) particles.push(new Particle()); animate(); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        window.addEventListener('resize', resize);
        initSpace();

        // --- 2. GAME LOGIC ---
        const totalCards = 113;
        const lobby = document.getElementById('lobby');
        const stageCard = document.getElementById('stage-card');
        const stageNum = document.getElementById('stage-number');
        const ritualArea = document.getElementById('ritual-area');
        const wishDisplay = document.getElementById('wish-display');
        const tabletop = document.getElementById('tabletop');
        const liveLangSwitch = document.getElementById('live-lang-switch');
        let currentActiveCards = [];

        function resetApp() {
            stageCard.style.display = 'none'; stageNum.style.display = 'none'; lobby.style.display = 'flex';
            ritualArea.style.display = 'block'; wishDisplay.style.display = 'none'; tabletop.classList.add('locked');
            currentActiveCards = [];
        }

        function prepareCardGame(count) {
            const folder = document.getElementById('deck-selector').value;
            liveLangSwitch.value = folder;
            lobby.style.display = 'none'; stageCard.style.display = 'block';
            document.getElementById('card-title').innerText = count === 1 ? "ĐƠN QUẺ" : "TAM QUẺ TÀI LỘC";
            tabletop.innerHTML = ''; 
            currentActiveCards = [];

            // RULE: KHÔNG RÚT TRÙNG LÁ
            let picked = new Set();
            while(picked.size < count) {
                picked.add(Math.floor(Math.random() * totalCards) + 1);
            }
            currentActiveCards = Array.from(picked);

            currentActiveCards.forEach(randomNum => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-label">BÀI ĐANG ÚP...</div>
                    <div class="flip-card" onclick="flipCard(this, ${randomNum})">
                        <div class="flip-card-inner">
                            <div class="card-back"><img class="img-back" src="${folder}/BACK.png"></div>
                            <div class="card-front"><img class="img-front" src="${folder}/${randomNum}.png"></div>
                        </div>
                    </div>
                `;
                tabletop.appendChild(slot);
            });
        }

        function switchLanguage() {
            const newFolder = liveLangSwitch.value;
            document.querySelectorAll('.img-back').forEach(img => img.src = `${newFolder}/BACK.png`);
            document.querySelectorAll('.img-front').forEach((img, index) => img.src = `${newFolder}/${currentActiveCards[index]}.png`);
        }

        function startRitual() {
            const val = document.getElementById('ritual-input').value.trim();
            if (!val) { alert("Vui lòng nhập tâm nguyện!"); return; }
            ritualArea.style.display = 'none';
            wishDisplay.innerText = `Tâm nguyện: "${val}"`;
            wishDisplay.style.display = 'block';
            tabletop.classList.remove('locked');
            document.querySelectorAll('.card-label').forEach(label => label.innerText = "CHẠM ĐỂ LẬT BÀI");
        }

        function flipCard(el, num) {
            const inner = el.querySelector('.flip-card-inner');
            if (!inner.classList.contains('is-flipped')) {
                inner.classList.add('is-flipped');
                el.parentElement.querySelector('.card-label').innerText = `LÁ SỐ #${num}`;
            }
        }

        function initNumberStage(type) {
            lobby.style.display = 'none'; stageNum.style.display = 'block';
            const resArea = document.getElementById('number-result');
            const rollBtn = document.getElementById('roll-btn');
            resArea.innerHTML = `<div style="font-style: italic; color: #444; margin: 80px 0; font-size: 1.5rem;">Đang chờ tín hiệu vũ trụ...</div>`;
            rollBtn.innerText = "KHAI VẬN (ROLL)";
            
            rollBtn.onclick = () => {
                if (type === 'small') {
                    const n = Math.floor(Math.random() * 99) + 1;
                    resArea.innerHTML = `<div class="num-display">${n}</div>`;
                    document.getElementById('number-title').innerText = "VẬN MAY NHỎ (1-99)";
                } else {
                    let s = new Set(); while(s.size < 6) s.add(Math.floor(Math.random() * 55) + 1);
                    const sorted = Array.from(s).sort((a,b)=>a-b).map(n=>n<10?'0'+n:n);
                    let h = '<div class="lotto-group">'; sorted.forEach(n=>h+=`<div class="lotto-ball">${n}</div>`);
                    resArea.innerHTML = h + '</div>';
                    document.getElementById('number-title').innerText = "VẬN MAY LỚN (6 SỐ)";
                }
                rollBtn.innerText = "ROLL LẠI";
            };
        }
    </script>
</body>
</html>
