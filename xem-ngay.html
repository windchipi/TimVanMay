<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xem Ngày Đại Cát - Nhà Tiên Tri</title>
    <script src="ngay-tot-xau.js"></script>
    <style>
        :root { --primary: #00ff95; --bg-deep: #050509; --card-bg: rgba(22, 27, 34, 0.85); }
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-deep); color: #fff; margin: 0; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 20px; border-bottom: 1px solid #333; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        
        .console-box { max-width: 500px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); }
        select, input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--primary); color: #fff; border-radius: 8px; font-size: 1rem; box-sizing: border-box;}
        
        .result-box { display: none; margin-top: 25px; padding: 20px; border-radius: 10px; animation: fadeIn 0.5s; }
        .good { background: rgba(0, 255, 149, 0.2); border: 1px solid var(--primary); color: var(--primary); }
        .bad { background: rgba(255, 51, 51, 0.2); border: 1px solid #ff3333; color: #ff3333; }
        
        .btn-check { width: 100%; padding: 15px; background: var(--primary); border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Quay lại</a>
        <h2 style="color: var(--primary); margin:0;">XEM NGÀY ĐẠI CÁT</h2>
        <div style="width: 100px;"></div>
    </div>

    <div class="console-box">
        <p>Bạn định làm việc gì?</p>
        <select id="job-select"></select>
        
        <p>Chọn ngày dự định:</p>
        <input type="date" id="date-input">
        
        <button class="btn-check" onclick="checkDate()">KIỂM TRA THỜI VẬN</button>
        
        <div id="result-area" class="result-box">
            <h3 id="res-status"></h3>
            <p id="res-soul"></p>
        </div>
    </div>

    <script>
        // Load danh sách việc từ DB
        const select = document.getElementById('job-select');
        DateJobDB.forEach(job => {
            let opt = document.createElement('option');
            opt.value = job.id;
            opt.innerHTML = job.name;
            select.appendChild(opt);
        });

        // Đặt ngày mặc định là hôm nay
        document.getElementById('date-input').valueAsDate = new Date();

        function checkDate() {
    const jobId = select.value;
    const dateVal = document.getElementById('date-input').value;
    if (!dateVal) return alert("Chọn ngày đã bạn ơi!");

    const date = new Date(dateVal);
    
    // Thuật toán Nhân Phẩm mới: 
    // Lấy Ngày + Tháng + (Độ dài của tên công việc) để tạo biến số
    // Như vậy mỗi công việc trong cùng 1 ngày sẽ có kết quả khác nhau
    const job = DateJobDB.find(j => j.id === jobId);
    const magicNumber = date.getDate() + (date.getMonth() + 1) + job.name.length;
    
    const resArea = document.getElementById('result-area');
    const resStatus = document.getElementById('res-status');
    const resSoul = document.getElementById('res-soul');

    resArea.style.display = "block";
    
    // Dùng số dư của phép chia cho 3 để tạo ra 3 trạng thái: Đại Cát, Bình Thường, Hắc Ám
    const resultType = magicNumber % 3;

    if (resultType === 0) {
        // Trạng thái TỐT
        resArea.className = "result-box good";
        resStatus.innerHTML = "✅ NGÀY ĐẠI CÁT";
        resSoul.innerHTML = job.good;
    } else if (resultType === 1) {
        // Trạng thái BÌNH THƯỜNG (Tao mới thêm cho thực tế)
        resArea.className = "result-box good"; 
        resArea.style.borderColor = "#888"; // Đổi viền xám cho trung tính
        resArea.style.color = "#ccc";
        resStatus.innerHTML = "⚖️ NGÀY BÌNH HÒA";
        resSoul.innerHTML = "Ngày này không tốt không xấu, mọi sự tùy duyên. Cứ làm việc bình thường thôi bạn nhé!";
    } else {
        // Trạng thái XẤU
        resArea.className = "result-box bad";
        resStatus.innerHTML = "❌ NGÀY KHÔNG TỐT";
        resSoul.innerHTML = job.bad;
    }
}
    </script>
</body>
</html>
