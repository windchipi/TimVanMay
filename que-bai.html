<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rút Quẻ Tài Lộc - Nhà Tiên Tri</title>
    <style>
        :root { --primary: #00ff95; --primary-glow: rgba(0, 255, 149, 0.4); --bg-deep: #050509; --card-bg: rgba(22, 27, 34, 0.85); --card-w: 350px; --card-h: 574px; }
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-deep); color: #c9d1d9; margin: 0; min-height: 100vh; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 20px; border-bottom: 1px solid #333; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .ritual-container { max-width: 550px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); backdrop-filter: blur(10px); }
        .ritual-textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; resize: none; font-size: 1.1rem; margin-top: 10px; outline: none; }
        .ritual-btn { margin-top: 15px; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 1.1rem; }
        #wish-display { display: none; max-width: 800px; margin: 20px auto; padding: 15px; border: 1px dashed var(--primary); background: rgba(0, 255, 149, 0.1); border-radius: 10px; font-style: italic; }
        .tabletop { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 20px; flex-wrap: wrap; padding: 20px; min-height: 600px; }
        .locked { filter: blur(10px); pointer-events: none; opacity: 0.2; }
        .card-slot { width: var(--card-w); display: flex; flex-direction: column; align-items: center; }
        .card-label { color: var(--primary); font-family: monospace; margin-bottom: 12px; font-weight: bold; }
        .flip-card { width: var(--card-w); height: var(--card-h); perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); background: #111; }
        .card-front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: contain; border-radius: 13px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Quay lại Lobby</a>
        <h2 id="card-title" style="color: var(--primary); margin:0;">Khai Quẻ</h2>
        <div style="width: 100px;"></div>
    </div>
    <div id="wish-display"></div>
    <div id="ritual-area" class="ritual-container">
        <p style="margin: 0; color: var(--primary); font-weight: bold; text-transform: uppercase;">Tâm niệm điều bạn muốn hỏi:</p>
        <textarea id="ritual-input" class="ritual-textarea"></textarea>
        <button class="ritual-btn" onclick="startRitual()">Gửi tâm nguyện & Khai quẻ</button>
    </div>
    <div class="tabletop locked" id="tabletop"></div>

    <script>
        const placeholderSuggestions = ["Dự án game sắp tới của tôi có bùng nổ không?", "Cơ chế Core Loop này có giúp Retention tăng không?", "Tôi có nên đổi hướng sang làm game Hypercasual không?", "Cân bằng game như thế này đã chuẩn chưa Master?"];
        const cardPool = []; for (let i = 1; i <= 113; i++) cardPool.push(i.toString()); cardPool.push("67.5", "93.5", "95.5");

        const urlParams = new URLSearchParams(window.location.search);
        const count = parseInt(urlParams.get('count')) || 1;

        window.onload = () => {
            const randomIdx = Math.floor(Math.random() * placeholderSuggestions.length);
            document.getElementById('ritual-input').placeholder = placeholderSuggestions[randomIdx];
            document.getElementById('card-title').innerText = count === 1 ? "ĐƠN QUẺ" : "TAM QUẺ TÀI LỘC";
            
            let shuffled = [...cardPool].sort(() => Math.random() - 0.5);
            let picked = shuffled.slice(0, count);
            const tabletop = document.getElementById('tabletop');
            picked.forEach(num => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `<div class="card-label">BÀI ĐANG ÚP...</div><div class="flip-card" onclick="this.querySelector('.flip-card-inner').classList.toggle('is-flipped')"><div class="flip-card-inner"><div class="card-back"><img src="VN/BACK.png"></div><div class="card-front"><img src="VN/${num}.png"></div></div></div>`;
                tabletop.appendChild(slot);
            });
        };

        function startRitual() {
            const val = document.getElementById('ritual-input').value.trim();
            if (!val) return alert("Bạn hãy nhập tâm nguyện trước nhé!");
            document.getElementById('ritual-area').style.display = 'none';
            document.getElementById('wish-display').innerText = `Tâm nguyện: "${val}"`;
            document.getElementById('wish-display').style.display = 'block';
            document.getElementById('tabletop').classList.remove('locked');
        }
    </script>
</body>
</html>
