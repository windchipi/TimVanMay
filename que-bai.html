<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rút Quẻ Tài Lộc - Nhà Tiên Tri</title>
    <style>
        :root {
            --primary: #00ff95;
            --primary-glow: rgba(0, 255, 149, 0.4);
            --bg-deep: #050509;
            --card-bg: rgba(22, 27, 34, 0.85);
            --card-w: 350px; 
            --card-h: 574px; 
        }

        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-deep); color: #c9d1d9; 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1200px; margin: 0 auto; padding: 20px; 
            border-bottom: 1px solid #333; 
        }
        .back-btn { 
            background: #333; color: white; border: 1px solid #555; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; 
            text-decoration: none; font-size: 0.9rem; transition: 0.3s;
        }
        .back-btn:hover { background: #555; }

        /* --- RITUAL AREA --- */
        .ritual-container { 
            max-width: 550px; margin: 20px auto; background: var(--card-bg); 
            padding: 25px; border-radius: 15px; border: 1px solid var(--primary); 
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0, 255, 149, 0.1);
        }
        .ritual-textarea { 
            width: 100%; height: 120px; background: #000; color: #fff; 
            border: 1px solid #444; border-radius: 8px; padding: 12px; 
            box-sizing: border-box; resize: none; font-size: 1.1rem; 
            margin-top: 10px; outline: none; 
        }
        .ritual-btn { 
            margin-top: 15px; padding: 15px; background: var(--primary); 
            color: #000; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
            width: 100%; font-size: 1.1rem; transition: 0.3s;
        }
        .ritual-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary); }

        #wish-display { 
            display: none; max-width: 800px; margin: 20px auto; 
            padding: 15px; border: 1px dashed var(--primary); 
            background: rgba(0, 255, 149, 0.1); border-radius: 10px; 
            font-style: italic; color: #fff;
        }

        /* --- TABLETOP (FIXED LAYOUT) --- */
        .tabletop { 
            display: flex; flex-direction: row; justify-content: center; 
            align-items: flex-start; gap: 20px; flex-wrap: wrap; 
            padding: 20px; min-height: 600px; transition: 0.5s;
        }
        .locked { filter: blur(10px); pointer-events: none; opacity: 0.2; }
        
        .card-slot { 
            width: var(--card-w); display: flex; flex-direction: column; 
            align-items: center; margin-bottom: 30px;
        }
        .card-label { 
            color: var(--primary); font-family: monospace; 
            margin-bottom: 12px; font-size: 1.1rem; font-weight: bold;
            text-shadow: 0 0 5px #000;
        }
        
        /* --- CARD FLIP LOGIC --- */
        .flip-card { width: var(--card-w); height: var(--card-h); perspective: 1000px; cursor: pointer; }
        .flip-card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
        }
        .is-flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 15px; border: 2px solid var(--primary); 
            box-shadow: 0 0 20px var(--primary-glow); background: #111; 
        }
        .card-back { z-index: 2; }
        .card-front { transform: rotateY(180deg); z-index: 1; }
        
        img { width: 100%; height: 100%; object-fit: contain; border-radius: 13px; }

        @media (max-width: 1100px) {
            .tabletop { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Quay lại Lobby</a>
        <h2 id="card-title" style="color: var(--primary); margin:0;">KHAI QUẺ</h2>
        <div style="width: 100px;"></div>
    </div>

    <div id="wish-display"></div> 

    <div id="ritual-area" class="ritual-container">
        <p style="margin: 0; color: var(--primary); font-weight: bold; text-transform: uppercase;">Tâm niệm điều bạn muốn hỏi:</p>
        <textarea id="ritual-input" class="ritual-textarea"></textarea>
        <button class="ritual-btn" onclick="startRitual()">Gửi tâm nguyện & Khai quẻ</button>
    </div>

    <div class="tabletop locked" id="tabletop"></div>

    <script>
        const placeholderSuggestions = [
            "Dự án game sắp tới của tôi có bùng nổ không?",
            "Cơ chế Core Loop này có giúp Retention tăng không?",
            "Tôi có nên đổi hướng sang làm game Hypercasual không?",
            "Cân bằng game như thế này đã chuẩn chưa Master?",
            "Lá bài nào đại diện cho vận may của tôi hôm nay?"
        ];

        const cardPool = [];
        for (let i = 1; i <= 113; i++) cardPool.push(i.toString());
        cardPool.push("67.5", "93.5", "95.5");

        // Lấy số lượng lá bài từ URL (?count=1 hoặc ?count=3)
        const urlParams = new URLSearchParams(window.location.search);
        const count = parseInt(urlParams.get('count')) || 1;

        window.onload = () => {
            const randomIdx = Math.floor(Math.random() * placeholderSuggestions.length);
            document.getElementById('ritual-input').placeholder = placeholderSuggestions[randomIdx];
            document.getElementById('card-title').innerText = count === 1 ? "ĐƠN QUẺ" : "TAM QUẺ TÀI LỘC";
            
            initCards();
        };

        function initCards() {
            const tabletop = document.getElementById('tabletop');
            tabletop.innerHTML = ''; 
            
            let shuffled = [...cardPool].sort(() => Math.random() - 0.5);
            let picked = shuffled.slice(0, count);

            picked.forEach(num => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-label">BÀI ĐANG ÚP...</div>
                    <div class="flip-card" onclick="handleFlip(this, '${num}')">
                        <div class="flip-card-inner">
                            <div class="card-back">
                                <img src="VN/BACK.png">
                            </div>
                            <div class="card-front">
                                <img src="VN/${num}.png" onerror="this.src='VN/BACK.png'; console.error('Thiếu ảnh: ${num}.png')">
                            </div>
                        </div>
                    </div>
                `;
                tabletop.appendChild(slot);
            });
        }

        function handleFlip(el, num) {
            const inner = el.querySelector('.flip-card-inner');
            if (!inner.classList.contains('is-flipped')) {
                inner.classList.add('is-flipped');
                // Cập nhật nhãn ngay sau khi lật
                el.parentElement.querySelector('.card-label').innerText = `LÁ SỐ #${num}`;
            }
        }

        function startRitual() {
            const val = document.getElementById('ritual-input').value.trim();
            if (!val) return alert("Bạn hãy nhập tâm nguyện trước nhé!");
            
            document.getElementById('ritual-area').style.display = 'none';
            const wd = document.getElementById('wish-display');
            wd.innerText = `Tâm nguyện: "${val}"`;
            wd.style.display = 'block';
            
            // Mở khóa bàn bài
            document.getElementById('tabletop').classList.remove('locked');
            document.querySelectorAll('.card-label').forEach(l => l.innerText = "CHẠM ĐỂ LẬT BÀI");
        }
    </script>
</body>
</html>
