<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vận May Vũ Trụ - Nhà Tiên Tri</title>
    <style>
        :root { --primary: #ffcc00; --bg-deep: #050509; }
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-deep); color: #fff; margin: 0; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 20px; border-bottom: 1px solid #333; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .num-display { font-size: 8rem; font-weight: bold; color: var(--primary); margin: 50px 0; text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); }
        .lotto-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 40px 0; }
        .lotto-ball { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; border: 4px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .roll-btn { padding: 20px 50px; font-size: 1.2rem; font-weight: bold; background: var(--primary); border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Quay lại</a>
        <h2 id="number-title" style="color:var(--primary)">VẬN MAY</h2>
        <div style="width: 100px;"></div>
    </div>
    <div id="number-result" style="min-height: 300px; display: flex; align-items: center; justify-content: center;">
        <div style="font-style: italic; color: #444; font-size: 1.5rem;">Nhấn Roll để nhận tín hiệu...</div>
    </div>
    <button class="roll-btn" onclick="roll()">KHAI VẬN (ROLL)</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'small';
        document.getElementById('number-title').innerText = type === 'small' ? "VẬN MAY NHỎ" : "VẬN MAY LỚN";

        function roll() {
            const res = document.getElementById('number-result');
            if (type === 'small') {
                res.innerHTML = `<div class="num-display">${Math.floor(Math.random()*99)+1}</div>`;
            } else {
                let s = new Set(); while(s.size<6) s.add(Math.floor(Math.random()*55)+1);
                let h = '<div class="lotto-group">';
                Array.from(s).sort((a,b)=>a-b).forEach(n => h+=`<div class="lotto-ball">${n<10?'0'+n:n}</div>`);
                res.innerHTML = h + '</div>';
            }
        }
    </script>
</body>
</html>
